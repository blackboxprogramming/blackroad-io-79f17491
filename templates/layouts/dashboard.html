<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}} — BlackRoad</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{base_url}}/templates/styles/variables.css">
  <link rel="stylesheet" href="{{base_url}}/templates/styles/base.css">
  <link rel="stylesheet" href="{{base_url}}/templates/styles/typography.css">
  <link rel="stylesheet" href="{{base_url}}/templates/styles/components.css">
  <link rel="stylesheet" href="{{base_url}}/templates/styles/dashboard.css">
</head>
<body class="dashboard-layout">
  <!-- Sidebar -->
  {{> sidebar}}

  <!-- Main Content -->
  <main class="main">
    <!-- Header -->
    <header class="header">
      <h1 class="header-title">{{page_title}}</h1>
      <div class="header-actions">
        {{header_actions}}
      </div>
    </header>

    <!-- Content -->
    <div class="content">
      {{{content}}}
    </div>
  </main>
</body>
</html>
