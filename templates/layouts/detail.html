<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}} — BlackRoad</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{base_url}}/templates/styles/variables.css">
  <link rel="stylesheet" href="{{base_url}}/templates/styles/base.css">
  <link rel="stylesheet" href="{{base_url}}/templates/styles/typography.css">
  <link rel="stylesheet" href="{{base_url}}/templates/styles/components.css">
  <link rel="stylesheet" href="{{base_url}}/templates/styles/detail.css">
</head>
<body>
  <div class="page">
    <!-- Breadcrumb -->
    {{> breadcrumb}}

    <!-- Hero/Header Section -->
    {{hero}}

    <!-- Tabs (optional) -->
    {{#if tabs}}
    {{> tabs}}
    {{/if}}

    <!-- Content Grid -->
    <div class="content-grid">
      <div class="main-col">
        {{main_content}}
      </div>
      <aside>
        {{sidebar_content}}
      </aside>
    </div>
  </div>
</body>
</html>
