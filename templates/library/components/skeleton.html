<!-- Skeleton Loading Component -->
<!--
  Variables:
    - variant: 'card', 'list', 'header', or 'grid'
    - rows: Number of rows (for list variant)
    - columns: Number of columns (for grid variant)
    - show_avatar: Boolean to show avatar placeholder
    - class: Additional CSS classes (optional)
-->
<div class="skeleton-container {{class}}">
  {{#if (eq variant 'header')}}
  <div class="skeleton-header">
    {{#if show_avatar}}
    <div class="skeleton-avatar"></div>
    {{/if}}
    <div class="skeleton-text">
      <div class="skeleton-line" style="width: 40%;"></div>
      <div class="skeleton-line" style="width: 25%;"></div>
    </div>
  </div>
  {{/if}}

  {{#if (eq variant 'grid')}}
  <div class="skeleton-row">
    {{#times columns}}
    <div class="skeleton-block"></div>
    {{/times}}
  </div>
  {{/if}}

  {{#if (eq variant 'card')}}
  <div class="skeleton-card">
    <div class="skeleton-line" style="width: 70%;"></div>
    <div class="skeleton-line" style="width: 100%;"></div>
    <div class="skeleton-line" style="width: 50%;"></div>
  </div>
  {{/if}}

  {{#if (eq variant 'list')}}
  {{#times rows}}
  <div class="skeleton-list-item">
    <div class="skeleton-avatar"></div>
    <div class="skeleton-text">
      <div class="skeleton-line" style="width: 60%;"></div>
      <div class="skeleton-line" style="width: 40%;"></div>
    </div>
  </div>
  {{/times}}
  {{/if}}
</div>
