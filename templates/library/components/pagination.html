<!-- Pagination Component -->
<!--
  Variables:
    - current_page: Current page number
    - total_pages: Total number of pages
    - total_items: Total number of items
    - items_per_page: Items shown per page
    - start_item: First item number on current page
    - end_item: Last item number on current page
    - item_name: Name of items (e.g., "agents", "tasks")
    - show_per_page: boolean - show per page selector
    - per_page_options: Array of numbers [10, 25, 50, 100]
-->
<div class="pagination {{class}}">
  <div class="pagination-info">
    Showing <strong>{{start_item}}-{{end_item}}</strong> of <strong>{{total_items}}</strong> {{#if item_name}}{{item_name}}{{else}}items{{/if}}
  </div>

  <div class="pagination-controls">
    <button class="page-btn {{#if (eq current_page 1)}}disabled{{/if}}" data-page="prev" {{#if (eq current_page 1)}}disabled{{/if}}>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
        <path d="m15 18-6-6 6-6"/>
      </svg>
    </button>

    {{#each pages}}
    {{#if (eq this '...')}}
    <span class="page-separator">...</span>
    {{else}}
    <button class="page-btn {{#if (eq this ../current_page)}}active{{/if}}" data-page="{{this}}">{{this}}</button>
    {{/if}}
    {{/each}}

    <button class="page-btn {{#if (eq current_page total_pages)}}disabled{{/if}}" data-page="next" {{#if (eq current_page total_pages)}}disabled{{/if}}>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
        <path d="m9 18 6-6-6-6"/>
      </svg>
    </button>

    {{#if show_per_page}}
    <div class="per-page">
      <span class="per-page-label">per page</span>
      <select class="per-page-select" name="per_page">
        {{#each per_page_options}}
        <option value="{{this}}" {{#if (eq this ../items_per_page)}}selected{{/if}}>{{this}}</option>
        {{/each}}
      </select>
    </div>
    {{/if}}
  </div>
</div>
