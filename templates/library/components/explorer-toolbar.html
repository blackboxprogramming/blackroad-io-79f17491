<!-- Explorer Toolbar Component -->
<!--
  Variables:
    - breadcrumb: [string] - path segments
    - can_go_back: boolean
    - can_go_forward: boolean
    - view_mode: "list" | "grid"
-->
<div class="explorer-toolbar {{class}}">
  <div class="toolbar-group">
    <button class="toolbar-btn {{#unless can_go_back}}disabled{{/unless}}" title="Back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>
    <button class="toolbar-btn {{#unless can_go_forward}}disabled{{/unless}}" title="Forward">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </button>
  </div>

  <div class="breadcrumb">
    {{#each breadcrumb}}
    {{#unless @first}}
    <span class="breadcrumb-sep">/</span>
    {{/unless}}
    <span class="breadcrumb-item {{#if @last}}current{{/if}}">{{this}}</span>
    {{/each}}
  </div>

  <div class="toolbar-actions">
    <div class="view-toggle">
      <button class="view-btn {{#if (eq view_mode 'list')}}active{{/if}}" title="List view">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
          <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
        </svg>
      </button>
      <button class="view-btn {{#if (eq view_mode 'grid')}}active{{/if}}" title="Grid view">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
      </button>
    </div>
    <button class="toolbar-btn" title="More options">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
        <circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/>
      </svg>
    </button>
  </div>
</div>
