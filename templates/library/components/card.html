<!-- Basic Card -->
<!-- Usage: {{title}}, {{body}}, {{footer}} (optional) -->
<div class="card {{class}}">
  <div class="card-title">{{title}}</div>
  <div class="card-body">{{body}}</div>
  {{#if footer}}
  <div class="card-footer">
    {{footer}}
  </div>
  {{/if}}
</div>
