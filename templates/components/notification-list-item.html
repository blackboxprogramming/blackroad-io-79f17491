<!-- Notification List Item Component (Full Page) -->
<!--
  Variables:
    - id: Notification ID
    - icon: Icon HTML (optional)
    - title: Notification title
    - description: Notification description
    - badge: Badge label (optional)
    - time: Timestamp string
    - unread: Boolean for unread state
    - actions: Array of action objects with {label, action}
    - class: Additional CSS classes (optional)
-->
<div class="notification-list-item {{#if unread}}unread{{/if}} {{class}}" data-id="{{id}}">
  <div class="list-item-icon">
    {{#if icon}}
    {{{icon}}}
    {{else}}
    <span class="list-item-icon-inner"></span>
    {{/if}}
  </div>

  <div class="list-item-content">
    <div class="list-item-header">
      <span class="list-item-title">{{title}}</span>
      {{#if badge}}
      <span class="list-item-badge">{{badge}}</span>
      {{/if}}
    </div>

    {{#if description}}
    <div class="list-item-desc">{{description}}</div>
    {{/if}}

    <div class="list-item-footer">
      <span class="list-item-time">{{time}}</span>
      {{#if actions}}
      <div class="list-item-actions">
        {{#each actions}}
        <button class="list-action-btn" data-action="{{action}}">{{label}}</button>
        {{/each}}
      </div>
      {{/if}}
    </div>
  </div>

  <span class="list-item-dot"></span>
</div>
