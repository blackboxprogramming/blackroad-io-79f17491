<!-- Chat Input Component -->
<!--
  Variables:
    - placeholder: Input placeholder text
    - show_attachments: boolean - show attachment button
    - show_commands: boolean - show commands button
-->
<div class="chat-input-container">
  <div class="chat-input-box">
    {{#if show_attachments}}
    <div class="input-actions-left">
      <button class="input-btn" title="Attach file">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
          <path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
        </svg>
      </button>
      {{#if show_commands}}
      <button class="input-btn" title="Commands">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
          <path d="M18 3a3 3 0 0 0-3 3v12a3 3 0 0 0 3 3 3 3 0 0 0 3-3 3 3 0 0 0-3-3H6a3 3 0 0 0-3 3 3 3 0 0 0 3 3 3 3 0 0 0 3-3V6a3 3 0 0 0-3-3 3 3 0 0 0-3 3 3 3 0 0 0 3 3h12a3 3 0 0 0 3-3 3 3 0 0 0-3-3z"/>
        </svg>
      </button>
      {{/if}}
    </div>
    {{/if}}
    <textarea
      class="chat-textarea"
      placeholder="{{#if placeholder}}{{placeholder}}{{else}}Type a message...{{/if}}"
      rows="1"
    ></textarea>
    <button class="send-btn" title="Send message">
      <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>
  <div class="input-hint">
    <kbd>Enter</kbd> to send · <kbd>Shift + Enter</kbd> for new line
  </div>
</div>
