<!-- Chat Message Component -->
<!--
  Variables:
    - role: "user" | "agent"
    - avatar: Avatar letter/content
    - sender: Sender name
    - time: Message timestamp
    - content: Message content HTML (supports code blocks)
    - show_actions: boolean - show message action buttons
-->
<div class="message {{role}}">
  <div class="message-avatar">{{avatar}}</div>
  <div class="message-content">
    <div class="message-header">
      <span class="message-sender">{{sender}}</span>
      <span class="message-time">{{time}}</span>
    </div>
    <div class="message-bubble">
      {{{content}}}
    </div>
    {{#if show_actions}}
    <div class="message-actions">
      <button class="msg-action" title="Copy">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
      </button>
      <button class="msg-action" title="Regenerate">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
          <path d="M21 2v6h-6M3 12a9 9 0 0 1 15-6.7L21 8M3 22v-6h6M21 12a9 9 0 0 1-15 6.7L3 16"/>
        </svg>
      </button>
      <button class="msg-action" title="Like">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
          <path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/>
        </svg>
      </button>
    </div>
    {{/if}}
  </div>
</div>
