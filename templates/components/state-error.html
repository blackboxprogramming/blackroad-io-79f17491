<!-- Error State Component -->
<!--
  Variables:
    - code: HTTP error code (404, 500, 403, etc.)
    - title: Error title
    - description: Error description
    - primary_btn: Primary button label
    - primary_action: Primary button action (e.g., 'home', 'back', 'retry')
    - secondary_btn: Secondary button label (optional)
    - secondary_action: Secondary button action
    - class: Additional CSS classes (optional)
-->
<div class="state-card error {{class}}">
  <div class="error-code">{{code}}</div>
  <h1 class="state-title">{{title}}</h1>
  <p class="state-desc">{{description}}</p>
  <div class="state-actions">
    <button class="state-btn state-btn-primary" data-action="{{primary_action}}">{{primary_btn}}</button>
    {{#if secondary_btn}}
    <button class="state-btn state-btn-secondary" data-action="{{secondary_action}}">{{secondary_btn}}</button>
    {{/if}}
  </div>
</div>
