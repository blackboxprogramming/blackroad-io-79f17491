<!-- Inline Status Message Component -->
<!--
  Variables:
    - id: Status message ID
    - type: 'success', 'warning', 'error', or 'info'
    - icon: Custom icon HTML (optional)
    - title: Status title
    - description: Status description
    - action_label: Action button label (optional)
    - action: Action to perform
    - dismissible: Boolean to show dismiss button (default: true)
    - class: Additional CSS classes (optional)
-->
<div class="inline-state {{type}} {{class}}" data-status="{{id}}">
  <span class="inline-icon {{type}}">
    {{#if icon}}
    {{{icon}}}
    {{else}}
    {{#if (eq type 'success')}}
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
    {{else if (eq type 'warning')}}
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
      <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
      <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
    </svg>
    {{else if (eq type 'error')}}
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
      <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
    </svg>
    {{else}}
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
      <circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>
    </svg>
    {{/if}}
    {{/if}}
  </span>

  <div class="inline-content">
    <div class="inline-title">{{title}}</div>
    {{#if description}}
    <div class="inline-desc">{{description}}</div>
    {{/if}}
  </div>

  {{#if action_label}}
  <button class="inline-action" data-action="{{action}}">{{action_label}}</button>
  {{/if}}

  {{#unless (eq dismissible false)}}
  <button class="inline-action inline-dismiss" data-action="dismiss">Dismiss</button>
  {{/unless}}
</div>
