<!-- Button Component -->
<!--
  Variables:
    - text: Button label
    - variant: "primary" | "secondary" | "ghost"
    - size: "sm" | "lg" | null (default)
    - href: Link URL (renders as <a> if provided)
    - type: "button" | "submit" (default: "button")
    - disabled: boolean
    - icon: Icon HTML (optional, prepended to text)
-->

<!-- As button -->
<button
  type="{{#if type}}{{type}}{{else}}button{{/if}}"
  class="btn btn-{{#if variant}}{{variant}}{{else}}primary{{/if}} {{#if size}}btn-{{size}}{{/if}} {{class}}"
  {{#if disabled}}disabled{{/if}}
>
  {{#if icon}}{{icon}}{{/if}}
  {{text}}
</button>

<!-- As link (alternative) -->
<!--
<a
  href="{{href}}"
  class="btn btn-{{#if variant}}{{variant}}{{else}}primary{{/if}} {{#if size}}btn-{{size}}{{/if}} {{class}}"
>
  {{#if icon}}{{icon}}{{/if}}
  {{text}}
</a>
-->
