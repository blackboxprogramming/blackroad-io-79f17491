<!-- Callout/Admonition Component -->
<!--
  Variables:
    - type: "note" | "warning" | "danger" | "tip" | "info"
    - title: Callout title (optional)
    - content: Callout body text
    - icon: Custom icon HTML (optional)
-->
<div class="callout callout-{{#if type}}{{type}}{{else}}note{{/if}} {{class}}">
  <div class="callout-icon">
    {{#if icon}}
    {{{icon}}}
    {{else}}
    {{#if (eq type "warning")}}
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
      <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
      <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
    </svg>
    {{else if (eq type "danger")}}
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
      <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
    </svg>
    {{else if (eq type "tip")}}
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
      <path d="M9 18h6M10 22h4M12 2v1M12 8v1M4.22 4.22l.77.77M18.01 4.22l-.77.77M2 12h1M21 12h1M4.22 19.78l.77-.77M18.01 19.78l-.77-.77"/>
      <circle cx="12" cy="12" r="4"/>
    </svg>
    {{else}}
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
      <circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>
    </svg>
    {{/if}}
    {{/if}}
  </div>
  <div class="callout-content">
    {{#if title}}
    <div class="callout-title">{{title}}</div>
    {{/if}}
    <div class="callout-text">{{content}}</div>
  </div>
</div>
