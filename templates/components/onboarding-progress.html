<!-- Onboarding Progress Component -->
<!--
  Variables:
    - steps: [{ label, completed, active }]
    - progress_percent: Percentage for progress line fill
-->
<div class="progress-container {{class}}">
  <div class="progress-steps">
    <div class="progress-line">
      <div class="progress-line-fill" style="width: {{progress_percent}}%"></div>
    </div>
    {{#each steps}}
    <div class="step {{#if completed}}completed{{/if}} {{#if active}}active{{/if}}">
      <div class="step-circle">
        {{#if completed}}
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" width="14" height="14">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        {{else}}
        {{@index}}
        {{/if}}
      </div>
      <span class="step-label">{{label}}</span>
    </div>
    {{/each}}
  </div>
</div>
