<!-- Kanban Board Header Component -->
<!--
  Variables:
    - board: { name, icon, tasks, updated }
    - views: [{ name, active }]
    - members: [{ avatar, name }]
    - member_overflow: number of additional members
    - show_search: boolean
    - show_filter: boolean
-->
<header class="kanban-header {{class}}">
  <div class="header-left">
    <button class="back-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>
    <div class="board-info">
      {{#if board.icon}}
      <div class="board-icon" style="background-image: url('{{board.icon}}')"></div>
      {{else}}
      <div class="board-icon"></div>
      {{/if}}
      <div>
        <div class="board-title">{{board.name}}</div>
        <div class="board-meta">{{board.tasks}} tasks · Updated {{board.updated}}</div>
      </div>
    </div>
  </div>

  <div class="header-center">
    <div class="view-toggle">
      {{#each views}}
      <button class="view-btn {{#if active}}active{{/if}}">{{name}}</button>
      {{/each}}
    </div>
  </div>

  <div class="header-right">
    {{#if show_filter}}
    <button class="filter-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
        <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
      </svg>
      Filter
    </button>
    {{/if}}

    {{#if show_search}}
    <div class="search-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" class="search-input" placeholder="Search tasks...">
    </div>
    {{/if}}

    {{#if members}}
    <div class="members-group">
      {{#each members}}
      <div class="member-avatar" {{#if avatar}}style="background-image: url('{{avatar}}')"{{/if}} title="{{name}}"></div>
      {{/each}}
      {{#if ../member_overflow}}
      <div class="member-more">+{{../member_overflow}}</div>
      {{/if}}
    </div>
    {{/if}}

    <button class="btn btn-primary">+ Add Task</button>
  </div>
</header>
