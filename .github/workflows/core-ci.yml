name: CORE CI

on:
  pull_request:
    branches: [ main, master ]
    paths:
      - '**.html'
      - '**.js'
      - '**.ts'
      - '**.css'
      - '.github/workflows/core-ci.yml'
  push:
    branches: [ main, master ]
    paths:
      - '**.html'
      - '**.js'
      - '**.ts'
      - '**.css'
      - '.github/workflows/core-ci.yml'

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
