name: CI Failure Tracker

on:
  workflow_run:
    workflows: ["CORE CI"]
    types: [completed]

permissions:
  contents: read
  issues: write

jobs:
  report:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const workflowName = context.payload.workflow_run.name;
            const runUrl = context.payload.workflow_run.html_url;
            const titlePrefix = "CI failed: " + workflowName;

            // Check for existing open issues with the same title prefix
            const existingIssues = await github.rest.issues.listForRepo({
              ...context.repo,
              state: 'open',
              labels: 'ci-failure',
              per_page: 10
            });

            const duplicateIssue = existingIssues.data.find(issue =>
              issue.title.startsWith(titlePrefix)
            );

            if (duplicateIssue) {
              // Add comment to existing issue instead of creating duplicate
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: duplicateIssue.number,
                body: `Another failure occurred: ${runUrl}`
              });
              console.log(`Updated existing issue #${duplicateIssue.number}`);
            } else {
              // Create new issue with better formatting
              const body = [
                '## CI Failure Report',
                '',
                `**Workflow:** ${workflowName}`,
                `**Run URL:** ${runUrl}`,
                '',
                'Please investigate and fix the failing tests.'
              ].join('\n');

              await github.rest.issues.create({
                ...context.repo,
                title: titlePrefix,
                labels: ['ci-failure', 'bug'],
                body: body
              });
              console.log('Created new failure issue');
            }
