name: Auto Label

on:
  pull_request:
    types: [opened]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            // Determine labels based on repository name
            const repoName = context.repo.repo.toLowerCase()
            const labels = []
            
            if (repoName.includes("blackroad")) labels.push("core")
            if (repoName.includes("lab")) labels.push("labs")
            
            // Add labels if any were found
            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                ...context.repo,
                issue_number: context.issue.number,
                labels
              })
            }
