name: Stale Issue/PR Management (Reusable)

on:
  workflow_call:
    inputs:
      days-before-stale:
        description: 'Days of inactivity before marking as stale'
        required: false
        type: number
        default: 60
      days-before-close:
        description: 'Days after stale label before closing'
        required: false
        type: number
        default: 7
      stale-issue-message:
        description: 'Message to post when marking issue as stale'
        required: false
        type: string
        default: 'This issue has been automatically marked as stale due to inactivity. It will be closed if no further activity occurs.'
      stale-pr-message:
        description: 'Message to post when marking PR as stale'
        required: false
        type: string
        default: 'This pull request has been automatically marked as stale due to inactivity. It will be closed if no further activity occurs.'
      exempt-labels:
        description: 'Labels that exempt issues/PRs from being marked stale (comma-separated)'
        required: false
        type: string
        default: 'pinned,security,critical'

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-stale: ${{ inputs.days-before-stale }}
          days-before-close: ${{ inputs.days-before-close }}
          stale-issue-message: ${{ inputs.stale-issue-message }}
          stale-pr-message: ${{ inputs.stale-pr-message }}
          exempt-issue-labels: ${{ inputs.exempt-labels }}
          exempt-pr-labels: ${{ inputs.exempt-labels }}
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
