name: Release Generator (Reusable)

on:
  workflow_call:
    inputs:
      tag-name:
        description: 'Tag name for the release'
        required: true
        type: string
      generate-changelog:
        description: 'Automatically generate changelog from commits'
        required: false
        type: boolean
        default: true
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false
      draft:
        description: 'Create as draft release'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - uses: actions/github-script@v7
        with:
          script: |
            const tagName = '${{ inputs.tag-name }}';
            const generateChangelog = ${{ inputs.generate-changelog }};
            
            let body = '';
            
            if (generateChangelog) {
              // Get commits since last tag
              const { data: tags } = await github.rest.repos.listTags({
                ...context.repo,
                per_page: 2
              });
              
              const previousTag = tags.length > 1 ? tags[1].name : null;
              
              if (previousTag) {
                const { data: comparison } = await github.rest.repos.compareCommits({
                  ...context.repo,
                  base: previousTag,
                  head: tagName
                });
                
                body = '## Changes\n\n';
                comparison.commits.forEach(commit => {
                  body += `- ${commit.commit.message.split('\n')[0]} (${commit.sha.substring(0, 7)})\n`;
                });
              } else {
                body = '## Initial Release\n\nFirst release of the project.';
              }
            }
            
            // Create release
            const release = await github.rest.repos.createRelease({
              ...context.repo,
              tag_name: tagName,
              name: tagName,
              body: body,
              draft: ${{ inputs.draft }},
              prerelease: ${{ inputs.prerelease }}
            });
            
            console.log(`Created release: ${release.data.html_url}`);
