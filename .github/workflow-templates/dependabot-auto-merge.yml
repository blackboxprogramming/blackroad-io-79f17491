name: Dependabot Auto-Merge

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    uses: blackboxprogramming/blackroad-io/.github/workflows/reusable/dependabot-auto-merge.yml@main
    with:
      merge-minor: true
      merge-patch: true
      merge-major: false
    permissions:
      contents: write
      pull-requests: write
