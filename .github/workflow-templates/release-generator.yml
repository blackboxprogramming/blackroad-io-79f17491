name: Release Generator

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  create-release:
    uses: blackboxprogramming/blackroad-io/.github/workflows/reusable/release-generator.yml@main
    with:
      tag-name: ${{ github.ref_name }}
      generate-changelog: true
    permissions:
      contents: write
