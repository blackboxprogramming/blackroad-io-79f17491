<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Page not found - BlackRoad">
    <title>404 - Page Not Found | BlackRoad</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="styles.css">
    <style>
      /* 404 page-specific styles */
      main {
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
      }

      .error-content {
        max-width: 500px;
      }

      .error-code {
        font-size: clamp(6rem, 20vw, 10rem);
        font-weight: 700;
        line-height: 1;
        margin-bottom: 1rem;
        background: linear-gradient(135deg, var(--color-text-muted) 0%, var(--color-border) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .error-content h1 {
        font-size: 1.5rem;
        margin-bottom: 1rem;
      }

      .error-content p {
        margin-bottom: 2rem;
      }

      .back-home {
        display: inline-block;
        background: var(--color-accent);
        color: white;
        padding: 0.75rem 1.5rem;
        border-radius: 6px;
        font-weight: 500;
        transition: background 0.2s;
      }

      .back-home:hover {
        background: var(--color-accent-hover);
        color: white;
      }
    </style>
  </head>
  <body>
    <header>
      <a href="index.html" class="logo">BlackRoad</a>
      <nav>
        <a href="about.html">About</a>
        <a href="features.html">Features</a>
        <a href="downloads.html">Downloads</a>
        <a href="docs.html">Docs</a>
        <a href="activity.html">Activity</a>
        <a href="contact.html">Contact</a>
      </nav>
    </header>

    <main>
      <div class="error-content">
        <div class="error-code">404</div>
        <h1>Page Not Found</h1>
        <p>The page you're looking for doesn't exist or has been moved. Check the URL or head back to the homepage.</p>
        <a href="index.html" class="back-home">Back to Home</a>
      </div>
    </main>

    <footer>
      <p>BlackRoad &copy; 2025. Building the future of sovereign AI.</p>
    </footer>
  </body>
</html>
